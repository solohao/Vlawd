,sans-serif" font-size="15" font-weight="700" fill="#111714" text-anchor="start" >停止输出</text><text x="304" y="364" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="12" font-weight="500" fill="#627068" text-anchor="start"><tspan x="304" dy="0">检测到用户插话后调用 Provider cancel。</tspan><tspan x="304" dy="19.200000000000003">等待 Provider 返回，再清空播放队列。</tspan></text><rect x="304" y="450" width="466" height="86" rx="13" fill="#FFE4E4" stroke="none" stroke-width="1" /><text x="324" y="479" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#F05F62" text-anchor="start" >风险</text><text x="324" y="505" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="500" fill="#29332D" text-anchor="start"><tspan x="324" dy="0">Provider 失联时无法停止；</tspan><tspan x="324" dy="14.5">播放队列可能继续输出旧回答。</tspan></text><text x="304" y="586" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#A0AAA4" text-anchor="start" >Evidence</text><text x="304" y="610" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#111714" text-anchor="start" >失败报告 B-114 / Bluetooth HFP</text><rect x="814" y="256" width="510" height="410" rx="16" fill="#F7FCE9" stroke="#EAF7C0" stroke-width="1" /><rect x="836" y="276" width="112" height="30" rx="15" fill="#EAF7C0" stroke="none" stroke-width="1" /><circle cx="852" cy="291" r="4" fill="#425700" stroke="none" stroke-width="1" /><text x="863" y="296" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#425700" text-anchor="start" >候选 Patch</text><text x="836" y="328" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#111714" text-anchor="start" >本地优先停止</text><text x="836" y="364" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="12" font-weight="500" fill="#627068" text-anchor="start"><tspan x="836" dy="0">检测到插话后立即 flush 本地播放队列，</tspan><tspan x="836" dy="19.200000000000003">并行发送 Provider cancel，不等待远端返回。</tspan></text><rect x="836" y="450" width="466" height="86" rx="13" fill="#EAF7C0" stroke="none" stroke-width="1" /><text x="856" y="479" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#425700" text-anchor="start" >Postcondition</text><text x="856" y="505" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="500" fill="#29332D" text-anchor="start"><tspan x="856" dy="0">输出设备静音且 generation id 失效；</tspan><tspan x="856" dy="14.5">旧响应后续 chunk 全部丢弃。</tspan></text><text x="836" y="586" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#A0AAA4" text-anchor="start" >Evaluator</text><text x="836" y="610" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#111714" text-anchor="start" >3 次测试：平均 142ms / 全部通过</text><rect x="258" y="780" width="100" height="40" rx="12" fill="#F05F62" stroke="none" stroke-width="1" /><text x="308" y="805" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="13" font-weight="650" fill="#FFFFFF" text-anchor="middle" >拒绝</text><rect x="370" y="780" width="138" height="40" rx="12" fill="#F7F9F6" stroke="#DFE4E0" stroke-width="1" /><text x="439" y="805" font-family="'WenQuanYi Zen Hei','Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" font-size="13" font-weight="650" fill="#111714" text-anchor="middle" >保留为分支</text><rect x="1160" y="780" width="176" height="40" rx="1